<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="04.css">
</head>
<body>
    <div class="calculadora">
        <input type="text" disabled id="display">

        <div class="buttons">
        <button class="action" onclick="limpar()">C</button>
        <button class="action" id="delete" onclick="deletar()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-backspace-fill" viewBox="0 0 16 16">
  <path d="M15.683 3a2 2 0 0 0-2-2h-7.08a2 2 0 0 0-1.519.698L.241 7.35a1 1 0 0 0 0 1.302l4.843 5.65A2 2 0 0 0 6.603 15h7.08a2 2 0 0 0 2-2zM5.829 5.854a.5.5 0 1 1 .707-.708l2.147 2.147 2.146-2.147a.5.5 0 1 1 .707.708L9.39 8l2.146 2.146a.5.5 0 0 1-.707.708L8.683 8.707l-2.147 2.147a.5.5 0 0 1-.707-.708L7.976 8z"/>
</svg></button>
        <button class="action" onclick="colocarNoDisplay(`/`)">/</button>
        <button class="action" onclick="colocarNoDisplay(`*`)">*</button>
        <button onclick="colocarNoDisplay(`7`)">7</button>
        <button onclick="colocarNoDisplay(`8`)">8</button>
        <button onclick="colocarNoDisplay(`9`)">9</button>
        <button class="action" onclick="colocarNoDisplay(`-`)">-</button>
        <button onclick="colocarNoDisplay(`4`)">4</button>
        <button onclick="colocarNoDisplay(`5`)">5</button>
        <button onclick="colocarNoDisplay(`6`)">6</button>
        <button class="action" onclick="colocarNoDisplay(`+`)">+</button>
        <button onclick="colocarNoDisplay(`1`)">1</button>
        <button onclick="colocarNoDisplay(`2`)">2</button>
        <button onclick="colocarNoDisplay(`3`)">3</button>
        <button id="n0" onclick="colocarNoDisplay(`0`)">0</button>
        <button onclick="colocarNoDisplay(`.`)">.</button>
        <button id="btn-igual" onclick="calcular()">=</button>
        </div>
    
    </div>

    <script src="./04.js"></script>
</body>
</html>
